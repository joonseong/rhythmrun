name: CI

on:
  push:
    branches:
      - main
      - develop
      - 'claude/**'
      - 'feature/**'
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --strict

  build-and-test:
    name: Build & Test
    runs-on: macos-15
    needs: lint

    env:
      SCHEME: RhythmRun
      DESTINATION: platform=iOS Simulator,name=iPhone 16,OS=latest

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Show build settings
        run: xcodebuild -showBuildSettings -project RhythmRun.xcodeproj -scheme $SCHEME

      - name: Build
        run: |
          xcodebuild build \
            -project RhythmRun.xcodeproj \
            -scheme $SCHEME \
            -destination "$DESTINATION" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Test
        run: |
          xcodebuild test \
            -project RhythmRun.xcodeproj \
            -scheme $SCHEME \
            -destination "$DESTINATION" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath TestResults.xcresult \
            | xcpretty

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
